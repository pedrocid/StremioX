name: StremioX
options:
  bundleIdPrefix: com.stremiox
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  MPVKit:
    url: https://github.com/mpvkit/MPVKit
    exactVersion: "0.41.0"
targets:
  StremioX:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources/Assets.xcassets
      - path: Resources/server.js
        buildPhase: resources
      - path: Resources/fonts
        optional: true
        type: folder
        buildPhase: resources
    dependencies:
      - package: MPVKit
        product: MPVKit-GPL
      - framework: Vendor/nodejs-mobile/NodeMobile.xcframework
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stremiox.app
        MARKETING_VERSION: "0.2.17"
        CURRENT_PROJECT_VERSION: "44"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: Resources/Info-iOS.plist
        INFOPLIST_KEY_CFBundleDisplayName: StremioX
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UIRequiresFullScreen: "YES"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
  # tvOS has NO WebKit, so this is a native client (SwiftUI + addon HTTP + libmpv),
  # NOT the iOS web-host app. It shares only the MPVKit player core (Sources/Player).
  StremioXTV:
    type: application
    platform: tvOS
    sources:
      - SourcesTV
      - SourcesShared      # OS-agnostic layer: engine bridge, models, account, ranking, themes
      - Sources/Player
      - Sources/NodeServer.swift
      - ResourcesTV/Assets.xcassets
      - path: Resources/server.js
        buildPhase: resources
      - path: Resources/fonts
        optional: true
        type: folder
        buildPhase: resources
    dependencies:
      - package: MPVKit
        product: MPVKit-GPL
      - framework: Vendor/nodejs-mobile/NodeMobile.xcframework
        embed: true
        codeSign: true
      # The Rust stremio-core engine (staticlib xcframework), linked, not embedded.
      - framework: Vendor/StremioXCore.xcframework
        embed: false
      # AVKit must be an explicit link: the only thing used from it is the
      # UIWindow.avDisplayManager CATEGORY (no link-time symbols), so autolink
      # plus the dead-stripping linker silently dropped the framework, the
      # category never loaded at runtime, and every avDisplayManager access
      # aborted with an unrecognized selector (sim AND device, 2026-06-10).
      - sdk: AVKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stremiox.tv
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Player/StremioX-Bridging.h
        MARKETING_VERSION: "0.2.17"
        CURRENT_PROJECT_VERSION: "44"
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: ResourcesTV/Info-tvOS.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"   # explicit UIScene adoption (tvOS 26 compliance)
        INFOPLIST_KEY_CFBundleDisplayName: StremioX
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
