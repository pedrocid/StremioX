name: Release tvOS IPA

# Builds the tvOS IPA from source on GitHub's runners and attaches it to the
# release, so anyone can verify the published binary really comes from this
# code (issue #7). Everything it consumes is public: NodeMobile and the fonts
# from this repo's vendor release, server.js from Stremio's CDN, and the
# stremio-core engine built from the core/ crate in this repo.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tvos:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Select the newest Xcode on the runner
        run: |
          XCODE="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Show toolchain
        id: toolchain
        run: |
          xcodebuild -version
          xcrun --sdk appletvos --show-sdk-version
          echo "xcode_version=$(xcodebuild -version | tr ' \n' '-')" >> "$GITHUB_OUTPUT"
          echo "tvos_sdk=$(xcrun --sdk appletvos --show-sdk-version)" >> "$GITHUB_OUTPUT"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Rust nightly with rust-src (tvOS is a tier 3 target)
        run: |
          rustup toolchain install nightly --profile minimal --component rust-src
          rustup +nightly target add aarch64-apple-ios aarch64-apple-ios-sim

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: cargo-${{ runner.os }}-${{ hashFiles('core/Cargo.lock', 'core/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Fetch server deps (NodeMobile, server.js, subtitle fonts)
        run: ./scripts/fetch-server-deps.sh

      - name: Cache stremio-core xcframework
        id: cache-core-xcframework
        uses: actions/cache@v4
        with:
          path: app/Vendor/StremioXCore.xcframework
          key: stremio-core-xcframework-${{ runner.os }}-${{ steps.toolchain.outputs.xcode_version }}-${{ steps.toolchain.outputs.tvos_sdk }}-${{ hashFiles('core/Cargo.lock', 'core/Cargo.toml', 'core/rust-toolchain.toml', 'core/src/**', 'core/include/**', 'scripts/build-core-xcframework.sh') }}

      - name: Build the stremio-core xcframework
        if: steps.cache-core-xcframework.outputs.cache-hit != 'true'
        run: ./scripts/build-core-xcframework.sh

      - name: Generate the Xcode project
        run: cd app && xcodegen generate

      - name: Build (unsigned Release, same as the published builds)
        run: |
          cd app
          xcodebuild -project StremioX.xcodeproj -scheme StremioXTV \
            -configuration Release -destination 'generic/platform=tvOS' \
            -derivedDataPath build/ci CODE_SIGNING_ALLOWED=NO build

      - name: Package the IPA
        run: |
          mkdir -p out/Payload
          cp -R app/build/ci/Build/Products/Release-appletvos/StremioXTV.app out/Payload/
          cd out
          zip -qry StremioX-tvOS-ci.ipa Payload
          shasum -a 256 StremioX-tvOS-ci.ipa | tee SHA256SUMS-ci.txt

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: StremioX-tvOS-ci
          path: out/StremioX-tvOS-ci.ipa

      - name: Attach the CI build to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mv out/StremioX-tvOS-ci.ipa "out/StremioX-tvOS-$TAG-ci.ipa"
          shasum -a 256 "out/StremioX-tvOS-$TAG-ci.ipa" > out/SHA256SUMS-ci.txt
          gh release upload "$TAG" "out/StremioX-tvOS-$TAG-ci.ipa" out/SHA256SUMS-ci.txt --clobber
